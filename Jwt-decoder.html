<!DOCTYPE html>
<html>
<head>
    <title>JWT Decoder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        .output {
            margin-top: 20px;
        }

        pre {
            background: #f4f4f4;
            padding: 15px;
            overflow-x: auto;
            border-radius: 5px;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>JWT Decoder</h1>

<p>Paste a JWT below:</p>

<textarea
    id="jwtInput"
    placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
></textarea>

<button onclick="decodeJWT()">
    Decode JWT
</button>

<div class="output">

    <h2>Header</h2>
    <pre id="headerOutput"></pre>

    <h2>Payload</h2>
    <pre id="payloadOutput"></pre>

    <h2>Signature</h2>
    <pre id="signatureOutput"></pre>

    <div id="errorOutput" class="error"></div>

</div>

<script>

function unixToDate(timestamp) {
    return new Date(timestamp * 1000);
}

function formatDate(date) {

    return date.toLocaleString(
        undefined,
        {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        }
    );
}

function decodeJWT() {

    try {

        const token =
            document.getElementById("jwtInput")
                .value
                .trim();

        const parts = token.split(".");

        if (parts.length !== 3) {
            throw new Error("Invalid JWT");
        }

        const header =
            JSON.parse(base64UrlDecode(parts[0]));

        const payload =
            JSON.parse(base64UrlDecode(parts[1]));

        document.getElementById("headerOutput")
            .textContent =
                JSON.stringify(header, null, 4);

        document.getElementById("payloadOutput")
            .textContent =
                JSON.stringify(payload, null, 4);

        const alg =
            header.alg || "Unknown";

        const iat =
            payload.iat
                ? unixToDate(payload.iat)
                : null;

        const exp =
            payload.exp
                ? unixToDate(payload.exp)
                : null;

        let analysis = "";

        analysis += `Algorithm: ${alg}\n`;

        if (header.typ) {
            analysis += `Type: ${header.typ}\n`;
        }

        if (iat) {
            analysis +=
                `Issued At: ${formatDate(iat)}\n`;
        }

        if (exp) {
            analysis +=
                `Expires At: ${formatDate(exp)}\n`;
        }

        if (iat && exp) {

            const minutes =
                Math.round(
                    (exp - iat) / 60000
                );

            analysis +=
                `Lifetime: ${minutes} minutes\n`;

            if (minutes <= 15) {

                analysis +=
                    "✓ Lifetime within 15 minute recommendation\n";

            } else {

                analysis +=
                    "⚠ Lifetime exceeds 15 minutes\n";
            }
        }

        if (exp) {

            const now = new Date();

            if (now > exp) {

                analysis +=
                    "✗ Token has expired\n";

            } else {

                const remaining =
                    Math.round(
                        (exp - now) / 60000
                    );

                analysis +=
                    `✓ Valid (${remaining} minutes remaining)\n`;
            }
        }

        document.getElementById("analysis")
            .textContent = analysis;

    } catch (e) {

        document.getElementById("analysis")
            .textContent = e.message;
    }
}

</script>

<h2>JWT Analysis</h2>

<div id="analysis"
     style="
        background:#f5f5f5;
        padding:15px;
        border-radius:8px;
        white-space:pre-wrap;">
</div>

</body>
</html>
