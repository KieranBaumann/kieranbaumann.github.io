<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/theme.css">
<script src="js/darkmode.js" defer></script>
<nav>
    <a href="index.html">Home</a>
    <a href="Jwt-decoder.html">JWT</a>
    <a href="xss.html">XSS</a>
    <a href="clickjacking.html">Clickjacking</a>

    <button id="applyTheme">
        🌙 Dark Mode
    </button>
</nav>
<title>JWT Decoder & Security Analyzer</title>

<style>
textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    font-family: monospace;
    margin-bottom: 10px;
}

button {
    padding: 10px 15px;
    margin-right: 5px;
    cursor: pointer;
}

.card {
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.pass {
    color: green;
    font-weight: bold;
}

.info {
    color: #1565c0;
}

.low {
    color: #0277bd;
}

.medium {
    color: #f57c00;
}

.high {
    color: #e65100;
    font-weight: bold;
}

.critical {
    color: #b71c1c;
    font-weight: bold;
}

.score {
    font-size: 28px;
    font-weight: bold;
}
</style>
</head>
<body>

<h1>JWT Decoder & Security Analyzer</h1>

<textarea id="jwtInput"
placeholder="Paste JWT here"></textarea>

<button onclick="decodeJWT()">Analyze JWT</button>

<div class="card">
    <h2>Security Score</h2>
    <div id="score" class="score">-</div>
</div>

<div class="card">
    <h2>Token Summary</h2>
    <div id="summary"></div>
</div>

<div class="card">
    <h2>Security Findings</h2>
    <div id="findings"></div>
</div>

<div class="grid">

    <div class="card">
        <h2>Header</h2>
        <button onclick="copyContent('headerOutput')">
            Copy
        </button>
        <pre id="headerOutput"></pre>
    </div>

    <div class="card">
        <h2>Payload</h2>
        <button onclick="copyContent('payloadOutput')">
            Copy
        </button>
        <pre id="payloadOutput"></pre>
    </div>

</div>

<div class="card">
    <h2>Claims Analysis</h2>
    <pre id="claimsOutput"></pre>
</div>

<script>

function base64UrlDecode(str) {

    str = str.replace(/-/g, '+')
             .replace(/_/g, '/');

    while (str.length % 4) {
        str += '=';
    }

    const decoded = atob(str);

    try {

        return decodeURIComponent(
            decoded.split('')
                .map(c =>
                    '%' +
                    ('00' +
                     c.charCodeAt(0)
                        .toString(16))
                    .slice(-2))
                .join('')
        );

    } catch {

        return decoded;
    }
}

function formatDate(unix) {

    return new Date(
        unix * 1000
    ).toLocaleString();
}

function copyContent(id) {

    navigator.clipboard.writeText(
        document.getElementById(id)
            .textContent
    );
}

function addFinding(
    findings,
    severity,
    text
) {

    findings.push({
        severity,
        text
    });
}

function decodeJWT() {

    try {

        const token =
            document.getElementById(
                'jwtInput'
            ).value.trim();

        const parts =
            token.split('.');

        if (parts.length !== 3) {
            throw new Error(
                'Invalid JWT format'
            );
        }

        const header =
            JSON.parse(
                base64UrlDecode(parts[0])
            );

        const payload =
            JSON.parse(
                base64UrlDecode(parts[1])
            );

        document.getElementById(
            'headerOutput'
        ).textContent =
            JSON.stringify(
                header,
                null,
                4
            );

        document.getElementById(
            'payloadOutput'
        ).textContent =
            JSON.stringify(
                payload,
                null,
                4
            );

        const findings = [];

        let score = 100;

        const alg =
            header.alg || 'Unknown';

        if (alg === 'none') {

            addFinding(
                findings,
                'critical',
                'Unsigned JWT (alg=none)'
            );

            score -= 50;

        } else if (
            alg.startsWith('HS')
        ) {

            addFinding(
                findings,
                'info',
                `Algorithm: ${alg}`
            );

        } else if (
            alg.startsWith('RS')
        ) {

            addFinding(
                findings,
                'info',
                `Algorithm: ${alg}`
            );

        } else {

            addFinding(
                findings,
                'medium',
                `Unknown algorithm: ${alg}`
            );

            score -= 10;
        }

        if (!payload.exp) {

            addFinding(
                findings,
                'high',
                'Missing exp claim'
            );

            score -= 20;
        }

        if (!payload.iat) {

            addFinding(
                findings,
                'medium',
                'Missing iat claim'
            );

            score -= 10;
        }

        if (!payload.aud) {

            addFinding(
                findings,
                'medium',
                'Missing aud claim'
            );

            score -= 5;
        }

        if (!payload.iss) {

            addFinding(
                findings,
                'low',
                'Missing iss claim'
            );

            score -= 2;
        }

        let lifetimeText =
            'Unknown';

        if (
            payload.iat &&
            payload.exp
        ) {

            const mins =
                Math.round(
                    (payload.exp -
                     payload.iat) / 60
                );

            lifetimeText =
                mins +
                ' minutes';

            if (mins <= 15) {

                addFinding(
                    findings,
                    'pass',
                    `Lifetime ${mins} minutes`
                );

            } else if (
                mins <= 60
            ) {

                addFinding(
                    findings,
                    'medium',
                    `Lifetime ${mins} minutes`
                );

                score -= 5;

            } else {

                addFinding(
                    findings,
                    'high',
                    `Excessive lifetime ${mins} minutes`
                );

                score -= 15;
            }
        }

        if (payload.exp) {

            const now =
                Math.floor(
                    Date.now() / 1000
                );

            if (
                payload.exp < now
            ) {

                addFinding(
                    findings,
                    'high',
                    'Token expired'
                );

                score -= 20;

            } else {

                const mins =
                    Math.round(
                        (payload.exp -
                         now) / 60
                    );

                addFinding(
                    findings,
                    'pass',
                    `${mins} minutes remaining`
                );
            }
        }

        if (
            payload.admin === true
        ) {

            addFinding(
                findings,
                'info',
                'Contains admin claim'
            );
        }

        if (payload.jti) {

            addFinding(
                findings,
                'info',
                'JWT ID present'
            );
        }

        score =
            Math.max(score, 0);

        document.getElementById(
            'score'
        ).textContent =
            score + '/100';

        let summary = `
Algorithm: ${alg}
Type: ${header.typ || 'Unknown'}

Issued At:
${payload.iat ? formatDate(payload.iat) : 'Not Present'}

Expires At:
${payload.exp ? formatDate(payload.exp) : 'Not Present'}

Lifetime:
${lifetimeText}
`;

        document.getElementById(
            'summary'
        ).innerHTML =
            summary.replaceAll(
                '\n',
                '<br>'
            );

        let findingsHTML = '';

        findings.forEach(f => {

            findingsHTML +=
                `<div class="${f.severity}">
                    ${f.text}
                 </div>`;
        });

        document.getElementById(
            'findings'
        ).innerHTML =
            findingsHTML;

        let claims = '';

        Object.entries(payload)
            .forEach(
                ([key, value]) => {

                claims +=
                    `${key}: ${JSON.stringify(value)}\n`;
            });

        document.getElementById(
            'claimsOutput'
        ).textContent =
            claims;

    } catch (e) {

        alert(
            'Error: ' +
            e.message
        );
    }
}
</script>

</body>
</html>
