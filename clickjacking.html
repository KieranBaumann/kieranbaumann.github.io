    <title>Clickjacking Frame Tester</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        input {
            width: 500px;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
        }

        iframe {
            width: 100%;
            height: 700px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Clickjacking Test</h1>

    <p>Enter a URL to test whether it can be embedded in an iframe.</p>

    <input
        type="url"
        id="urlInput"
        placeholder="https://example.com"
    >

    <button onclick="loadFrame()">
        Load URL
    </button>

    <iframe
        id="testFrame"
        src="about:blank">
    </iframe>

    <script>
        function loadFrame() {
            const url = document.getElementById('urlInput').value.trim();

            if (!url) {
                alert('Please enter a URL');
                return;
            }

            document.getElementById('testFrame').src = url;
        }
    </script>

</body>
